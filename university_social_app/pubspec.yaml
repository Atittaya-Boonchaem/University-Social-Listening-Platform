name: university_social_app
description: University Social Listening Platform - Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.6.0
  dio: ^5.3.1

  # State Management
  provider: ^6.0.0
  riverpod: ^2.3.0
  flutter_riverpod: ^2.3.0

  # Local Storage
  shared_preferences: ^2.5.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Authentication & Security
  flutter_secure_storage: ^9.0.0
  jwt_decoder: ^2.0.1

  # UI & Design
  flutter_screenutil: ^5.8.0
  google_fonts: ^6.0.0
  intl: ^0.18.0

  # Location & Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  geocoding: ^2.0.5

  # Image Processing
  image_picker: ^1.0.0
  permission_handler: 12.0.3

  # Validation
  validators: ^3.0.0

  # Logging
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true